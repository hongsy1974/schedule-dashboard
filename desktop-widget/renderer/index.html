<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>WorkFlow 위젯</title>
<style>
  /* Sized to fill whatever the actual OS window is (percentage, not a fixed
     px value) so main.js can shrink the window down to just the header bar
     for the "collapse" feature without the page content getting clipped or
     leaving dead space. */
  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Apple SD Gothic Neo", "Segoe UI", sans-serif;
    overflow: hidden;
    user-select: none;
  }

  #card {
    width: 100%; height: 100%;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    border-radius: 16px;
    background: #fff;
    border: 1px solid #E3E5E8;
    box-shadow: 0 12px 28px rgba(0,0,0,.16), 0 2px 6px rgba(0,0,0,.08);
    color: #333;
    -webkit-app-region: drag;
  }

  .no-drag { -webkit-app-region: no-drag; }

  #head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 14px 10px;
    flex: none;
  }
  .brand { font-size: 14px; font-weight: 800; letter-spacing: .1px; }
  .brand b { color: #F37321; }
  #date { font-size: 11px; color: #888; margin-top: 2px; }
  .head-left { display: flex; flex-direction: column; }
  /* 주간/달력 보기에서는 WorkFlow+날짜를 가운데로, 가로로, 50% 큰 폰트로 —
     리스트 보기는 원래 좌측 상단 레이아웃 그대로 유지. */
  #head.centered { justify-content: center; }
  #head.centered .head-left { flex-direction: row; align-items: baseline; gap: 8px; }
  #head.centered .brand { font-size: 21px; }
  #head.centered #date { font-size: 16.5px; margin-top: 0; }

  .head-btns { display: flex; gap: 6px; }
  .icon-btn {
    -webkit-app-region: no-drag;
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 1px solid #E3E5E8;
    background: #fff;
    color: #888;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .icon-btn:hover { background: #ECEDEF; color: #333; }

  #list {
    flex: 1;
    overflow-y: auto;
    padding: 0 10px 6px;
    -webkit-app-region: no-drag;
  }
  #list::-webkit-scrollbar { width: 6px; }
  #list::-webkit-scrollbar-thumb { background: #cfd2d6; border-radius: 3px; }

  .row {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 6px;
    border-radius: 8px;
    cursor: pointer;
  }
  .row:hover { background: #F4F6F8; }
  .bar { width: 4px; height: 26px; border-radius: 2px; flex: none; }
  .row-main { flex: 1; min-width: 0; }
  .row-name {
    font-size: 12.5px; font-weight: 600; color: #222;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .row-meta { font-size: 10.5px; color: #888; margin-top: 2px; }
  .row-dd {
    font-size: 10.5px; font-weight: 800; color: #888;
    flex: none;
  }
  .row-dd.today {
    color: #F37321; background: rgba(243,115,33,.14);
    padding: 2px 7px; border-radius: 5px;
  }
  .row-dd.over { color: #E53935; }

  .icon-btn.active { background: #FFF4EC; color: #F37321; border-color: #F37321; }

  #month {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 10px 3px;
    -webkit-app-region: no-drag;
  }
  #month-head {
    display: flex; align-items: center;
    gap: 8px;
    padding: 2px 2px 8px;
    flex: none;
  }
  /* head-btns가 여기로 옮겨오면(renderer.js) 맨 오른쪽으로 밀어낸다 — 이동 아이콘
     (‹●›)과 라벨은 왼쪽에 붙어서 표시된다. */
  #month-head #head-btns { margin-left: auto; }
  #month-label { font-size: 12.5px; font-weight: 700; }
  #month-nav { display: flex; gap: 4px; }
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  #month-dow { background: #F4F5F7; }
  .dow-cell {
    text-align: center;
    font-size: 11px; font-weight: 700;
    padding: 6px 0;
  }
  /* 사이트의 월간 일정(js/viewmodel.js monthCells)과 비슷한 회색 구분선(#E3E5E8)으로
     칸을 나누고, 폭도 넓혀서(main.js SIZES.month) 업무명이 site만큼 보이게 함. */
  #month-cells {
    border-top: 1px solid #E3E5E8;
    border-left: 1px solid #E3E5E8;
  }
  .day-cell {
    height: 88px;
    border-right: 1px solid #E3E5E8;
    border-bottom: 1px solid #E3E5E8;
    padding: 4px 5px;
    display: flex; flex-direction: column;
    gap: 2px;
    cursor: pointer;
    overflow: hidden;
  }
  .day-cell:hover { background: #F4F6F8; }
  .day-cell.today { background: #FFFBF7; }
  .day-cell.outside { background: #FAFBFC; opacity: .5; }
  .day-num {
    font-size: 11.5px; font-weight: 600; color: #555;
    width: 19px; height: 19px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex: none;
  }
  .day-cell.weekend .day-num { color: #bbb; }
  .day-cell.today .day-num { background: #F37321; color: #fff; font-weight: 900; }
  .day-items { display: flex; flex-direction: column; gap: 2px; min-width: 0; overflow: hidden; }
  .day-item {
    font-size: 9.1px; line-height: 1.2; padding: 1px 4px;
    border-radius: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .day-more { font-size: 10px; color: #aaa; padding-left: 2px; }

  #week {
    flex: none;
    display: flex;
    flex-direction: column;
    padding: 0 10px 3px;
    -webkit-app-region: no-drag;
    overflow: hidden;
  }
  #week-head-row {
    display: flex; align-items: center;
    gap: 8px;
    padding: 2px 2px 8px;
    flex: none;
  }
  /* head-btns가 여기로 옮겨오면(renderer.js) 맨 오른쪽으로 밀어낸다. */
  #week-head-row #head-btns { margin-left: auto; }
  #week-label { font-size: 12.5px; font-weight: 700; }
  #week-nav { display: flex; gap: 4px; }
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    flex: none;
  }
  /* 월간 일정의 요일 헤더(.dow-cell)와 같은 한 줄짜리 표시 — 날짜 숫자는 표시하지
     않는다(이미 위 주 범위 레이블과 오늘 강조로 어느 날짜인지 알 수 있음). */
  #week-head {
    border-top: 1px solid #E3E5E8;
    border-left: 1px solid #E3E5E8;
    border-bottom: 1px solid #E3E5E8;
  }
  .week-day-head {
    text-align: center;
    padding: 6px 0;
  }
  .wd-name { font-size: 11px; font-weight: 700; }
  /* 사이트의 주간 일정처럼 날짜 칸 영역을 고정 높이로 — flex:1로 남는 공간을
     채우게 두면 창 아래로 불필요하게 길게 늘어나 보인다. */
  #week-items {
    flex: none;
    height: 132px;
    align-content: start;
    overflow: hidden;
    border-left: 1px solid #E3E5E8;
  }
  .week-day-col {
    display: flex; flex-direction: column; gap: 4px; min-width: 0;
    height: 100%;
    padding: 2px 6px 4px;
    overflow: hidden;
  }
  .week-item {
    font-size: 10.1px; line-height: 1.25; padding: 3px 5px;
    border-radius: 4px; border-left: 2px solid;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    cursor: pointer;
  }

  #empty, #loading, #error {
    padding: 30px 16px; text-align: center;
    font-size: 12px; color: #888; line-height: 1.6;
  }
  #error { color: #E53935; }

  #foot {
    flex: none;
    padding: 5px 14px 14px;
  }
  #open-site {
    -webkit-app-region: no-drag;
    width: 100%; height: 30px;
    border: 1px solid #E3E5E8;
    background: #fff;
    color: #333;
    font-size: 11.5px; font-weight: 700;
    border-radius: 8px; cursor: pointer;
  }
  #open-site:hover { background: #F4F5F6; }

  /* Collapsed: only the header bar remains, everything else stays fully
     hidden (not just clipped) so there's no stray scrollbar or partial row. */
  body.collapsed #loading, body.collapsed #empty,
  body.collapsed #error, body.collapsed #list, body.collapsed #week,
  body.collapsed #month, body.collapsed #foot { display: none !important; }
  body.collapsed #card { border-radius: 12px; }
</style>
</head>
<body>
  <div id="card">
    <div id="head">
      <div class="head-left">
        <span class="brand">Work<b>Flow</b></span>
        <span id="date"></span>
      </div>
      <div class="head-btns" id="head-btns">
        <button class="icon-btn no-drag" id="btn-view-list" title="리스트 보기">📋</button>
        <button class="icon-btn no-drag" id="btn-view-week" title="주간 보기">📆</button>
        <button class="icon-btn no-drag" id="btn-view-month" title="달력 보기">📅</button>
        <button class="icon-btn no-drag" id="btn-pin" title="항상 위에 표시">📌</button>
        <button class="icon-btn no-drag" id="btn-collapse" title="접기">▁</button>
        <button class="icon-btn no-drag" id="btn-more" title="메뉴">⋯</button>
        <button class="icon-btn no-drag" id="btn-close" title="닫기">×</button>
      </div>
    </div>
    <div id="loading">불러오는 중…</div>
    <div id="empty" style="display:none">지금 표시할 해야할 일이 없어요 🎉</div>
    <div id="error" style="display:none"></div>
    <div id="list" style="display:none"></div>
    <div id="week" style="display:none">
      <div id="week-head-row">
        <div id="week-nav">
          <button class="icon-btn no-drag" id="btn-prev-week" title="지난 주">‹</button>
          <button class="icon-btn no-drag" id="btn-today-week" title="이번 주" style="font-size:10px">●</button>
          <button class="icon-btn no-drag" id="btn-next-week" title="다음 주">›</button>
        </div>
        <span id="week-label"></span>
      </div>
      <div class="week-grid" id="week-head"></div>
      <div class="week-grid" id="week-items"></div>
    </div>
    <div id="month" style="display:none">
      <div id="month-head">
        <div id="month-nav">
          <button class="icon-btn no-drag" id="btn-prev-month" title="이전 달">‹</button>
          <button class="icon-btn no-drag" id="btn-today-month" title="이번 달" style="font-size:10px">●</button>
          <button class="icon-btn no-drag" id="btn-next-month" title="다음 달">›</button>
        </div>
        <span id="month-label"></span>
      </div>
      <div class="month-grid" id="month-dow"></div>
      <div class="month-grid" id="month-cells"></div>
    </div>
    <div id="foot">
      <button id="open-site">WorkFlow Portal 열기</button>
    </div>
  </div>

  <script type="module" src="renderer.js"></script>
</body>
</html>
