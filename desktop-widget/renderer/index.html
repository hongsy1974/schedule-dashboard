<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>WorkFlow 위젯</title>
<style>
  /* Sized to fill whatever the actual OS window is (percentage, not a fixed
     px value) so main.js can shrink the window down to just the header bar
     for the "collapse" feature without the page content getting clipped or
     leaving dead space. */
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Apple SD Gothic Neo", "Segoe UI", sans-serif;
    overflow: hidden;
    user-select: none;
  }

  #card {
    width: 100%; height: 100%;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    border-radius: 16px;
    background: linear-gradient(160deg, rgba(32,28,24,.86), rgba(18,16,13,.92));
    border: 1px solid rgba(255,255,255,.14);
    box-shadow: 0 18px 40px rgba(0,0,0,.45);
    color: #fff;
    -webkit-app-region: drag;
  }

  .no-drag { -webkit-app-region: no-drag; }

  #head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 14px 10px;
    flex: none;
  }
  .brand { font-size: 14px; font-weight: 800; letter-spacing: .1px; }
  .brand b { color: #F37321; }
  #date { font-size: 11px; color: rgba(255,255,255,.55); margin-top: 2px; }
  .head-left { display: flex; flex-direction: column; }

  .head-btns { display: flex; gap: 6px; }
  .icon-btn {
    -webkit-app-region: no-drag;
    width: 22px; height: 22px;
    border-radius: 6px;
    border: none;
    background: rgba(255,255,255,.08);
    color: rgba(255,255,255,.7);
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .icon-btn:hover { background: rgba(255,255,255,.16); color: #fff; }

  #sub {
    padding: 0 14px 10px;
    font-size: 11.5px;
    color: rgba(255,255,255,.5);
    display: flex; align-items: center; gap: 6px;
    flex: none;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #43A047; flex: none; }
  .dot.off { background: #E53935; }

  #list {
    flex: 1;
    overflow-y: auto;
    padding: 0 10px 6px;
    -webkit-app-region: no-drag;
  }
  #list::-webkit-scrollbar { width: 6px; }
  #list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.18); border-radius: 3px; }

  .row {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 6px;
    border-radius: 8px;
    cursor: pointer;
  }
  .row:hover { background: rgba(255,255,255,.06); }
  .bar { width: 4px; height: 26px; border-radius: 2px; flex: none; }
  .row-main { flex: 1; min-width: 0; }
  .row-name {
    font-size: 12.5px; font-weight: 600; color: rgba(255,255,255,.94);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .row-meta { font-size: 10.5px; color: rgba(255,255,255,.45); margin-top: 2px; }
  .row-dd {
    font-size: 10.5px; font-weight: 800; color: rgba(255,255,255,.6);
    flex: none;
  }
  .row-dd.today {
    color: #F37321; background: rgba(243,115,33,.18);
    padding: 2px 7px; border-radius: 5px;
  }
  .row-dd.over { color: #FF6B5E; }

  .icon-btn.active { background: rgba(243,115,33,.25); color: #F37321; }

  #month {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 10px 6px;
    -webkit-app-region: no-drag;
  }
  #month-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 2px 2px 8px;
    flex: none;
  }
  #month-label { font-size: 12.5px; font-weight: 700; }
  #month-nav { display: flex; gap: 4px; }
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .dow-cell {
    text-align: center;
    font-size: 9.5px; font-weight: 700;
    color: rgba(255,255,255,.4);
    padding-bottom: 4px;
  }
  /* Wider 달력 view (see main.js SIZES.month) leaves enough room per column
     to mirror the website's monthly cells: date number top-left, then a
     couple of truncated task-name chips instead of plain dots. */
  .day-cell {
    height: 74px;
    border-radius: 6px;
    padding: 3px 4px;
    display: flex; flex-direction: column;
    gap: 2px;
    cursor: pointer;
    overflow: hidden;
  }
  .day-cell:hover { background: rgba(255,255,255,.06); }
  .day-cell.outside .day-num { color: rgba(255,255,255,.25); }
  .day-num {
    font-size: 10.5px; font-weight: 600; color: rgba(255,255,255,.8);
    width: 16px; height: 16px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex: none;
  }
  .day-cell.today .day-num { background: #F37321; color: #fff; font-weight: 800; }
  .day-items { display: flex; flex-direction: column; gap: 2px; min-width: 0; overflow: hidden; }
  .day-item {
    font-size: 9px; line-height: 14px; padding: 0 4px;
    border-radius: 3px; border-left: 2px solid;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .day-more { font-size: 8px; color: rgba(255,255,255,.45); padding-left: 2px; }

  #empty, #loading, #error {
    padding: 30px 16px; text-align: center;
    font-size: 12px; color: rgba(255,255,255,.5); line-height: 1.6;
  }
  #error { color: #FF8A7A; }

  #foot {
    flex: none;
    padding: 10px 14px 14px;
  }
  #open-site {
    -webkit-app-region: no-drag;
    width: 100%; height: 30px;
    border: 1px solid rgba(255,255,255,.18);
    background: rgba(255,255,255,.06);
    color: rgba(255,255,255,.85);
    font-size: 11.5px; font-weight: 700;
    border-radius: 8px; cursor: pointer;
  }
  #open-site:hover { background: rgba(255,255,255,.12); }

  /* Collapsed: only the header bar remains, everything else stays fully
     hidden (not just clipped) so there's no stray scrollbar or partial row. */
  body.collapsed #sub, body.collapsed #loading, body.collapsed #empty,
  body.collapsed #error, body.collapsed #list, body.collapsed #month,
  body.collapsed #foot { display: none !important; }
  body.collapsed #card { border-radius: 12px; }
</style>
</head>
<body>
  <div id="card">
    <div id="head">
      <div class="head-left">
        <span class="brand">Work<b>Flow</b></span>
        <span id="date"></span>
      </div>
      <div class="head-btns">
        <button class="icon-btn no-drag" id="btn-view-list" title="리스트 보기">📋</button>
        <button class="icon-btn no-drag" id="btn-view-month" title="달력 보기">📅</button>
        <button class="icon-btn no-drag" id="btn-pin" title="항상 위에 표시">📌</button>
        <button class="icon-btn no-drag" id="btn-collapse" title="접기">▁</button>
        <button class="icon-btn no-drag" id="btn-more" title="메뉴">⋯</button>
        <button class="icon-btn no-drag" id="btn-close" title="닫기">×</button>
      </div>
    </div>
    <div id="sub"><span class="dot" id="conn-dot"></span><span id="conn-label">연결 중…</span></div>
    <div id="loading">불러오는 중…</div>
    <div id="empty" style="display:none">지금 표시할 해야할 일이 없어요 🎉</div>
    <div id="error" style="display:none"></div>
    <div id="list" style="display:none"></div>
    <div id="month" style="display:none">
      <div id="month-head">
        <span id="month-label"></span>
        <div id="month-nav">
          <button class="icon-btn no-drag" id="btn-prev-month" title="이전 달">‹</button>
          <button class="icon-btn no-drag" id="btn-today-month" title="이번 달" style="font-size:10px">●</button>
          <button class="icon-btn no-drag" id="btn-next-month" title="다음 달">›</button>
        </div>
      </div>
      <div class="month-grid" id="month-dow"></div>
      <div class="month-grid" id="month-cells"></div>
    </div>
    <div id="foot">
      <button id="open-site">WorkFlow Portal 열기</button>
    </div>
  </div>

  <script type="module" src="renderer.js"></script>
</body>
</html>
